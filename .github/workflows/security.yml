name: Security Audit

on:
  workflow_dispatch: # Desactivado temporalmente el trigger automÃ¡tico debido a bloqueo de facturaciÃ³n en GitHub. Ejecutable manualmente.

jobs:
  snyk-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            npx --yes snyk auth ${{ secrets.SNYK_TOKEN }} || true
            npx --yes snyk code test || true
          else
            echo "Skipping Snyk scan due to missing token."
          fi

