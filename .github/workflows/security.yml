name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  snyk-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            npx snyk auth ${{ secrets.SNYK_TOKEN }} || true
            npx snyk code test || true
          else
            echo "Skipping Snyk scan due to missing token."
          fi
