name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  snyk-code-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Snyk SAST
        run: |
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            npx --yes snyk code test --token=${{ secrets.SNYK_TOKEN }}
          else
            echo "Skipping Snyk: No token provided."
          fi

  osv-dependency-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OSV-Scanner
        run: |
          docker run --rm -v $(pwd):/src ghcr.io/google/osv-scanner:latest /src -r || true

  windows-build-check:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Docker Build (Windows)
        run: |
          docker build -t tds-edr-suite .
