name: Security Audit

on:
  workflow_dispatch:

jobs:
  snyk-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Snyk
        uses: snyk/actions/setup@v3
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code Test
        run: |
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            npx --yes snyk auth ${{ secrets.SNYK_TOKEN }} || true
            npx --yes snyk code test || true
          else
            echo "Skipping Snyk scan due to missing token."
          fi

  osv-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OSV-Scanner natively via Docker
        continue-on-error: true
        run: |
          docker run --rm -v $(pwd):/src ghcr.io/google/osv-scanner:latest /src -r || true
