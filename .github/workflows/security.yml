name: Security Audit 2026

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  snyk-code-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Snyk
        uses: snyk/actions/setup@master
        with:
          snyk-version: 'latest'
      - name: Snyk SAST Audit
        run: snyk code test --sarif-file-output=snyk.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          SNYK_OIDC_ENABLED: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
        if: always()

  osv-dependency-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OSV-Scanner (v2 Syntax)
        uses: google/osv-scanner-action/v1
        with:
          scan-args: "scan source -r ./"

  windows-build-check:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Docker Build (Windows)
        run: docker build -t tds-edr-suite .
