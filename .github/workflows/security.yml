name: Security Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  snyk-code-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Snyk SAST
        run: |
          if [ -n "${{ secrets.SNYK_TOKEN }}" ]; then
            npx --yes snyk code test --token=${{ secrets.SNYK_TOKEN }}
          else
            echo "::warning::SNYK_TOKEN missing."
          fi

  osv-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OSV-Scanner
        run: |
          docker run --rm -v $(pwd):/src ghcr.io/google/osv-scanner:latest /src scan source -r /src

  windows-compilation-test:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Docker Build (Windows)
        run: docker build -t tds-edr-suite .
